version: "2"

formatters:
  enable:
    - goimports
    - gofmt

linters:
  enable:
    - copyloopvar     # detects loop variable copy issues (Go 1.22+)
    - errcheck        # unchecked errors
    - errorlint       # proper error wrapping (Go 1.13+)
    - exhaustive      # exhaustive enum switch/map checks
    - gosec           # security problems
    - gocritic        # bugs, performance, and style diagnostics
    - govet           # suspicious constructs
    - ineffassign     # unused assignments
    - nakedret        # naked returns
    - nilerr          # returning nil instead of error
    - predeclared     # shadowing predeclared identifiers
    - revive          # drop-in replacement for golint
    - staticcheck     # advanced static analysis
    - unconvert       # unnecessary type conversions
    - unparam         # unused function parameters
    - unused          # unused code
    - wastedassign    # wasted assignments

  settings:
    errcheck:
      check-type-assertions: true

    exhaustive:
      check:
        - switch
        - map

    govet:
      enable-all: true
      disable:
        - fieldalignment

    nakedret:
      max-func-lines: 0

    staticcheck:
      checks:
        - all
        - -ST1000 # package comment
        - -ST1016 # receiver name consistency

  exclusions:
    presets:
      - std-error-handling
      - common-false-positives
    rules:
      - text: 'exported method \S+\.\S+ should have comment or be unexported'
        linters: [ revive ]
      - path: '_test\.go'
        linters:
          - errcheck
          - gosec
